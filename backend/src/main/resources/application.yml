spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: comfortpick-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comfortpick}
    username: ${SPRING_DATASOURCE_USERNAME:comfortpick}
    password: ${SPRING_DATASOURCE_PASSWORD:comfortpick}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

riot:
  api:
    key: ${RIOT_API_KEY:}
    timeout: ${RIOT_API_TIMEOUT:5s}

comfortpick:
  web:
    allowed-origins: ${COMFORTPICK_WEB_ALLOWED_ORIGINS:}
  sync:
    target-matches: ${COMFORTPICK_SYNC_TARGET_MATCHES:500}
    batch-size: ${COMFORTPICK_SYNC_BATCH_SIZE:10}
    scheduler-interval: ${COMFORTPICK_SYNC_SCHEDULER_INTERVAL:20s}
    dashboard-poll-interval: ${COMFORTPICK_SYNC_DASHBOARD_POLL_INTERVAL:10s}
    max-accounts-per-tick: ${COMFORTPICK_SYNC_MAX_ACCOUNTS_PER_TICK:1}
    error-retry-delay: ${COMFORTPICK_SYNC_ERROR_RETRY_DELAY:5m}
