services:
  postgres:
    image: postgres:16-alpine
    container_name: comfortpick-postgres
    environment:
      POSTGRES_DB: comfortpick
      POSTGRES_USER: comfortpick
      POSTGRES_PASSWORD: comfortpick
    ports:
      - "5432:5432"
    volumes:
      - comfortpick-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comfortpick -d comfortpick"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: comfortpick-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  comfortpick-postgres-data:
